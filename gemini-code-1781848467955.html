<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>90天挑戰追蹤</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        table { border-collapse: collapse; width: 300px; }
        th, td { border: 1px solid #333; padding: 10px; text-align: center; }
        input { transform: scale(1.5); }
    </style>
</head>
<body>
    <h2>90天挑戰 (6/19開始)</h2>
    <table>
        <thead><tr><th>Day</th><th>Jeff</th><th>Peter</th></tr></thead>
        <tbody id="app"></tbody>
    </table>
    <script>
        const app = document.getElementById('app');
        for (let i = 1; i <= 90; i++) {
            let tr = `<tr><td>${i}</td><td><input type="checkbox"></td><td><input type="checkbox"></td></tr>`;
            app.innerHTML += tr;
        }
    </script>
</body>
</html>
